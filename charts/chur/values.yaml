# replicaCount is the number of webhook pod replicas.
replicaCount: 1

image:
  # image.repository is the container image repository for chur-webhook.
  repository: ghcr.io/lyafence/chur-webhook
  # image.tag is the image tag. Defaults to Chart appVersion if empty.
  tag: ""
  # image.pullPolicy is the image pull policy.
  pullPolicy: IfNotPresent

initImage:
  # initImage.repository is the container image repository for chur-init.
  repository: ghcr.io/lyafence/chur-init
  # initImage.tag is the image tag. Defaults to Chart appVersion if empty.
  tag: ""
  # initImage.pullPolicy is the image pull policy.
  pullPolicy: IfNotPresent

# imagePullSecrets is a list of image pull secret names for the webhook pod.
imagePullSecrets: []
# nameOverride replaces the chart name in resource names.
nameOverride: ""
# fullnameOverride completely replaces the generated resource names.
fullnameOverride: ""

serviceAccount:
  # serviceAccount.create specifies whether a service account should be created for the webhook.
  create: true
  # serviceAccount.annotations is a map of annotations to add to the webhook service account.
  annotations: {}
  # serviceAccount.name is the name of the service account to use. Generated if empty.
  name: ""

service:
  # service.type is the Kubernetes Service type.
  type: ClusterIP
  # service.port is the port that the Kubernetes API server connects to.
  port: 443
  # service.targetPort is the container port the service forwards to.
  targetPort: 8443

webhook:
  # webhook.tlsMode controls client authentication: "server" (default, no client cert)
  # or "mtls" (require API server client certificate).
  tlsMode: server
  # webhook.clientCAPath is the path to the CA bundle for verifying the API server
  # client certificate. Only used when tlsMode=mtls.
  clientCAPath: /etc/chur/ca.crt
  # webhook.listen is the listen address for the admission endpoint.
  listen: ":8443"
  # webhook.healthListen is the listen address for health and readiness probes.
  healthListen: ":8080"
  # webhook.volumeSizeLimit is the maximum size of the tmpfs volume per pod (e.g. "10Mi").
  volumeSizeLimit: "10Mi"
  # webhook.initMaxSecretSize is the default maximum secret size passed to chur-init.
  initMaxSecretSize: "1Mi"
  # webhook.initLocalBasePath is the default base path for the local provider passed to chur-init.
  initLocalBasePath: "/etc/chur/secrets"
  # webhook.allowedNamespaces is a list of namespaces where webhook mutates pods.
  # Empty means all namespaces.
  allowedNamespaces: []
  # webhook.maxConcurrent is the maximum number of concurrent admission reviews.
  maxConcurrent: 100
  # webhook.failurePolicy is the failure policy for the MutatingWebhookConfiguration.
  failurePolicy: Fail
  # webhook.timeoutSeconds is the timeout for admission review requests.
  timeoutSeconds: 5
  # webhook.resources is the resource requests and limits for the webhook container.
  resources: {}
  # webhook.nodeSelector is a node selector for the webhook pod.
  nodeSelector: {}
  # webhook.tolerations is a list of tolerations for the webhook pod.
  tolerations: []
  # webhook.affinity is the affinity configuration for the webhook pod.
  affinity: {}
  # webhook.securityContext is the pod-level security context for the webhook pod.
  securityContext: {}
  # webhook.priorityClassName is the priority class name for the webhook pod (opt-in).
  priorityClassName: ""
  # webhook.skipNamespaces is a list of namespaces that the webhook should NOT intercept.
  # Defaults to ["kube-system"] for safety.
  skipNamespaces:
    - kube-system

tls:
  # tls.provider selects the TLS certificate provisioning strategy:
  # "certManager" (default), "helmGenerated" (dev/CI), or "userSecret".
  provider: certManager
  certManager:
    # tls.certManager.issuerName is the name of the cert-manager Issuer or ClusterIssuer.
    issuerName: chur-selfsigned-issuer
    # tls.certManager.issuerKind is the kind of the issuer: "Issuer" (namespaced) or "ClusterIssuer" (cluster-scoped).
    issuerKind: Issuer
    # tls.certManager.duration is the certificate validity period (default 8760h = 365d).
    duration: 8760h
    # tls.certManager.renewBefore is how long before expiry to renew (default 360h = 15d).
    renewBefore: 360h
  helmGenerated:
    # tls.helmGenerated.validityDays is the certificate validity period in days.
    validityDays: 365
  userSecret:
    # tls.userSecret.name is the name of an existing TLS Secret (optional).
    # The Secret must contain tls.crt, tls.key, and optionally ca.crt.
    name: chur-webhook-tls
    # tls.userSecret.caBundle is the base64-encoded CA certificate for the MWC caBundle.
    # Required when using userSecret provider.
    caBundle: ""

mtls:
  # mtls.caBundle is the PEM-encoded CA certificate that signed the API server's
  # client certificate. Only needed when webhook.tlsMode=mtls. This value is stored
  # in a ConfigMap and mounted as-is (PEM format).
  caBundle: ""

pdb:
  # pdb.enabled controls whether a PodDisruptionBudget is created for the webhook.
  enabled: true
  # pdb.minAvailable is the minimum number of webhook pods that must be available
  # during voluntary disruptions.
  minAvailable: 1

keeper:
  # keeper.enabled controls whether the chur-keeper deployment and service are created.
  enabled: false
  # keeper.replicaCount is the number of keeper pod replicas.
  replicaCount: 1
  image:
    # keeper.image.repository is the container image repository for chur-keeper.
    repository: ghcr.io/lyafence/chur-keeper
    # keeper.image.tag is the image tag. Defaults to Chart appVersion if empty.
    tag: ""
    # keeper.image.pullPolicy is the image pull policy.
    pullPolicy: IfNotPresent
  # keeper.tlsMode controls TLS mode: "self-signed" or "mtls".
  tlsMode: self-signed
  # keeper.backend is the secret storage backend ("filesystem" or "exec").
  backend: filesystem
  # keeper.listen is the listen address for the keeper HTTPS endpoint.
  listen: ":9443"
  # keeper.healthListen is the listen address for keeper health probes.
  healthListen: ":9444"
  # keeper.maxSecretSize is the maximum secret size the keeper will serve.
  maxSecretSize: "1Mi"
  # keeper.maxConcurrent is the maximum number of concurrent requests.
  maxConcurrent: 100
  # keeper.fsRoot is the root directory for the filesystem backend.
  fsRoot: "/var/lib/chur-keeper/secrets"
  # keeper.execCommand is the command to execute (ref passed as argument). Required when backend=exec.
  execCommand: ""
  # keeper.execTimeout is the command execution timeout in seconds (default 10).
  execTimeout: 10
  # keeper.execMaxStdout is the maximum stdout bytes (default 1048576).
  execMaxStdout: 1048576
  volume:
    # keeper.volume.hostPath is the hostPath volume for secret storage.
    hostPath:
      path: /var/lib/chur-keeper/secrets
      type: DirectoryOrCreate
  tls:
    # keeper.tls.existingSecret is the name of an existing TLS Secret for the keeper.
    # Required when tlsMode=mtls.
    existingSecret: ""
    # keeper.tls.certPath is the path to the TLS certificate inside the keeper container.
    certPath: "/etc/chur-keeper/tls/tls.crt"
    # keeper.tls.keyPath is the path to the TLS key inside the keeper container.
    keyPath: "/etc/chur-keeper/tls/tls.key"
  mtls:
    clientCA:
      # keeper.mtls.clientCA.existingSecret is the name of a Secret containing the CA bundle
      # for verifying incoming mTLS client certificates.
      existingSecret: ""
      # keeper.mtls.clientCA.existingConfigMap is an alternative to existingSecret.
      # Mounts a ConfigMap containing the CA bundle for verifying mTLS client certs.
      existingConfigMap: ""
      # keeper.mtls.clientCA.path is the mount path for the client CA file.
      path: "/etc/chur-keeper/client-ca/ca.crt"
  clientTLS:
    # keeper.clientTLS.existingSecret mounts a Secret with tls.crt and tls.key into the
    # keeper pod for its server identity (alternative to tls.existingSecret).
    # For client-side certificates in chur-init, use extraVolumes + chur.io/provider-env.
    existingSecret: ""
  # keeper.extraVolumes is a list of extra volumes for the keeper pod.
  extraVolumes: []
  # keeper.extraVolumeMounts is a list of extra volume mounts for the keeper container.
  extraVolumeMounts: []
  # keeper.extraEnv is a list of extra environment variables for the keeper container.
  extraEnv: []
  service:
    # keeper.service.type is the Kubernetes Service type.
    type: ClusterIP
    # keeper.service.port is the port the keeper HTTPS service listens on.
    port: 9443
  # keeper.resources is the resource requests and limits for the keeper container.
  resources: {}

rbac:
  # rbac.create controls whether RBAC resources (SA, Role, RoleBinding) are created
  # for the chur-init init container.
  create: true
  # rbac.namespaces is the list of namespaces where RBAC is created. If empty, RBAC
  # is created only in the release namespace.
  namespaces: []
  # rbac.serviceAccountName is the name of the ServiceAccount used by chur-init
  # init containers. Pods using the k8s provider must set spec.serviceAccountName
  # to this value.
  serviceAccountName: chur-init
