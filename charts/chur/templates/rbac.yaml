{{- if .Values.rbac.create }}
{{- $namespaces := .Values.rbac.namespaces | default (list .Release.Namespace) }}
{{- range $ns := $namespaces }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $.Values.rbac.serviceAccountName }}
  namespace: {{ $ns }}
  labels:
    {{- include "chur.labels" $ | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "chur.fullname" $ }}-secret-reader
  namespace: {{ $ns }}
  labels:
    {{- include "chur.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "chur.fullname" $ }}-secret-reader
  namespace: {{ $ns }}
  labels:
    {{- include "chur.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "chur.fullname" $ }}-secret-reader
subjects:
  - kind: ServiceAccount
    name: {{ $.Values.rbac.serviceAccountName }}
    namespace: {{ $ns }}
---
{{- end }}
{{- end }}
