{{- if .Values.keeper.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chur.fullname" . }}-keeper
  labels:
    {{- include "chur.labels" . | nindent 4 }}
    app.kubernetes.io/component: keeper
spec:
  replicas: {{ .Values.keeper.replicaCount }}
  selector:
    matchLabels:
      {{- include "chur.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: keeper
  template:
    metadata:
      labels:
        {{- include "chur.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: keeper
    spec:
      {{- with .Values.keeper.extraInitContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: chur-keeper
          image: "{{ .Values.keeper.image.repository }}:{{ .Values.keeper.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.keeper.image.pullPolicy }}
          command: ["/chur-keeper"]
          ports:
            - containerPort: {{ .Values.keeper.listen | toString | splitList ":" | last | atoi | default 9443 }}
              name: keeper
            - containerPort: {{ .Values.keeper.healthListen | toString | splitList ":" | last | atoi | default 9444 }}
              name: health
          env:
            - name: CHUR_KEEPER_LISTEN
              value: "{{ .Values.keeper.listen }}"
            - name: CHUR_KEEPER_HEALTH_LISTEN
              value: "{{ .Values.keeper.healthListen }}"
            - name: CHUR_KEEPER_TLS_DNS_NAME
              value: "{{ include "chur.fullname" . }}-keeper.{{ .Release.Namespace }}.svc"
            - name: CHUR_KEEPER_TLS_MODE
              value: {{ .Values.keeper.tlsMode | quote }}
            - name: CHUR_KEEPER_BACKEND
              value: {{ .Values.keeper.backend | quote }}
            - name: CHUR_KEEPER_MAX_SECRET_SIZE
              value: "{{ .Values.keeper.maxSecretSize }}"
            - name: CHUR_KEEPER_MAX_CONCURRENT
              value: "{{ .Values.keeper.maxConcurrent }}"
            - name: CHUR_KEEPER_BACKEND_FS_ROOT
              value: {{ .Values.keeper.fsRoot | default "/var/lib/chur-keeper/secrets" | quote }}
          {{- if eq .Values.keeper.backend "exec" }}
            - name: CHUR_KEEPER_EXEC_COMMAND
              value: {{ .Values.keeper.execCommand | quote }}
            - name: CHUR_KEEPER_EXEC_TIMEOUT
              value: {{ .Values.keeper.execTimeout | default 10 | quote }}
            - name: CHUR_KEEPER_EXEC_MAX_STDOUT
              value: {{ .Values.keeper.execMaxStdout | default 1048576 | int64 | quote }}
          {{- end }}
          {{- if eq .Values.keeper.backend "http" }}
            - name: CHUR_KEEPER_HTTP_URL
              value: {{ .Values.keeper.httpURL | quote }}
            {{- if .Values.keeper.httpTokenFile }}
            - name: CHUR_KEEPER_HTTP_TOKEN_FILE
              value: {{ .Values.keeper.httpTokenFile | quote }}
            {{- end }}
            - name: CHUR_KEEPER_HTTP_TIMEOUT
              value: {{ .Values.keeper.httpTimeout | default 30 | int64 | quote }}
          {{- end }}
          {{- if eq .Values.keeper.tlsMode "mtls" }}
            - name: CHUR_KEEPER_TLS_CERT_PATH
              value: {{ .Values.keeper.tls.certPath | default "/etc/chur-keeper/tls/tls.crt" | quote }}
            - name: CHUR_KEEPER_TLS_KEY_PATH
              value: {{ .Values.keeper.tls.keyPath | default "/etc/chur-keeper/tls/tls.key" | quote }}
          {{- end }}
          {{- if or .Values.keeper.mtls.clientCA.existingSecret .Values.keeper.mtls.clientCA.existingConfigMap }}
            - name: CHUR_KEEPER_CLIENT_CA_PATH
              value: {{ .Values.keeper.mtls.clientCA.path | default "/etc/chur-keeper/client-ca/ca.crt" | quote }}
          {{- end }}
          {{- if and .Values.keeper.clientTLS.existingSecret (ne .Values.keeper.tlsMode "mtls") }}
            - name: CHUR_KEEPER_TLS_CERT_PATH
              value: "/etc/chur-keeper/client-tls/tls.crt"
            - name: CHUR_KEEPER_TLS_KEY_PATH
              value: "/etc/chur-keeper/client-tls/tls.key"
          {{- end }}
          {{- with .Values.keeper.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
          {{- if eq .Values.keeper.backend "filesystem" }}
            - name: secrets
              mountPath: /var/lib/chur-keeper/secrets
              readOnly: true
          {{- end }}
          {{- if eq .Values.keeper.tlsMode "mtls" }}
            - name: tls
              mountPath: /etc/chur-keeper/tls
              readOnly: true
          {{- end }}
          {{- if and (eq .Values.keeper.tlsMode "mtls") .Values.keeper.mtls.clientCA.existingSecret }}
            - name: client-ca
              mountPath: /etc/chur-keeper/client-ca
              readOnly: true
          {{- end }}
          {{- if and (eq .Values.keeper.tlsMode "mtls") .Values.keeper.mtls.clientCA.existingConfigMap }}
            - name: client-ca
              mountPath: /etc/chur-keeper/client-ca
              readOnly: true
          {{- end }}
          {{- if .Values.keeper.clientTLS.existingSecret }}
            - name: client-tls
              mountPath: /etc/chur-keeper/client-tls
              readOnly: true
          {{- end }}
          {{- with .Values.keeper.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
              scheme: HTTP
            initialDelaySeconds: 1
            periodSeconds: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            {{- toYaml .Values.keeper.resources | nindent 12 }}
      volumes:
      {{- if eq .Values.keeper.backend "filesystem" }}
        - name: secrets
          {{- toYaml .Values.keeper.volume | nindent 10 }}
      {{- end }}
      {{- if eq .Values.keeper.tlsMode "mtls" }}
        - name: tls
          secret:
            secretName: {{ .Values.keeper.tls.existingSecret }}
            defaultMode: 0444
      {{- end }}
      {{- if and (eq .Values.keeper.tlsMode "mtls") .Values.keeper.mtls.clientCA.existingSecret }}
        - name: client-ca
          secret:
            secretName: {{ .Values.keeper.mtls.clientCA.existingSecret }}
            defaultMode: 0444
      {{- end }}
      {{- if and (eq .Values.keeper.tlsMode "mtls") .Values.keeper.mtls.clientCA.existingConfigMap }}
        - name: client-ca
          configMap:
            name: {{ .Values.keeper.mtls.clientCA.existingConfigMap }}
            defaultMode: 0444
      {{- end }}
      {{- if .Values.keeper.clientTLS.existingSecret }}
        - name: client-tls
          secret:
            secretName: {{ .Values.keeper.clientTLS.existingSecret }}
            defaultMode: 0444
      {{- end }}
      {{- with .Values.keeper.extraVolumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
