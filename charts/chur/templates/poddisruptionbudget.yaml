{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "chur.fullname" . }}-webhook
  labels:
    {{- include "chur.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "chur.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: webhook
{{- end }}
