{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chur.fullname" . }}-webhook
  labels:
    {{- include "chur.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: webhook
  policyTypes: [Ingress]
  ingress:
    - ports:
        - port: 8443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chur.fullname" . }}-keeper
  labels:
    {{- include "chur.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: keeper
  policyTypes: [Ingress]
  # This is a basic port-restriction policy. It does not restrict which
  # sources can reach the keeper — that requires cluster-specific knowledge
  # of the network plugin and pod CIDR. Users should add custom ingress
  # rules (e.g., from:, namespaceSelector:) to match their network model.
  ingress:
    - ports:
        - port: 9443
{{- end }}
