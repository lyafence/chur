{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chur.fullname" . }}-webhook
  labels:
    {{- include "chur.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: webhook
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: {{ .Values.webhook.listen | toString | splitList ":" | last | atoi | default 8443 }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chur.fullname" . }}-keeper
  labels:
    {{- include "chur.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: keeper
  policyTypes: [Ingress]
  ingress:
    - from:
        # Allow from pods using chur-init with the keeper provider. chur-init
        # runs in application namespaces — restrict to the namespaces that
        # contain pods with chur.io/provider: keeper annotations.
        # Uncomment and adjust for your environment. Example:
        # - namespaceSelector:
        #     matchLabels:
        #       kubernetes.io/metadata.name: my-app
        # For all-namespace access (less restrictive):
        # - namespaceSelector: {}
      ports:
        - port: {{ .Values.keeper.listen | toString | splitList ":" | last | atoi | default 9443 }}
{{- end }}
