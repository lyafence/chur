name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          check-latest: true

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Build
        run: make build

      - name: Test
        run: make test

      - uses: azure/setup-helm@v5
        with:
          version: latest

      - name: Lint Helm chart
        run: helm lint charts/chur/

      - name: Template Helm chart
        run: helm template chur charts/chur/ --debug > /dev/null

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage.out
          format: golang

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          check-latest: true

      - name: Dependency audit
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
