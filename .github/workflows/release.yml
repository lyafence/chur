name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build and scan webhook
        id: webhook
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.webhook
          push: false
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/chur-webhook:${{ github.ref_name }}

      - name: Scan webhook
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/chur-webhook:${{ github.ref_name }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          scanners: vuln

      - name: Generate webhook SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/chur-webhook:${{ github.ref_name }}
          format: cyclonedx
          output: sbom-webhook.json
          scanners: vuln

      - name: Build and scan init
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.init
          push: false
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/chur-init:${{ github.ref_name }}

      - name: Scan init
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/chur-init:${{ github.ref_name }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          scanners: vuln

      - name: Generate init SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/chur-init:${{ github.ref_name }}
          format: cyclonedx
          output: sbom-init.json
          scanners: vuln

      - name: Build and scan keeper
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.keeper
          push: false
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/chur-keeper:${{ github.ref_name }}

      - name: Scan keeper
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/chur-keeper:${{ github.ref_name }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          scanners: vuln

      - name: Generate keeper SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/chur-keeper:${{ github.ref_name }}
          format: cyclonedx
          output: sbom-keeper.json
          scanners: vuln

      - name: Push images (multi-arch)
        run: |
          docker buildx build --push --platform linux/amd64,linux/arm64 \
            -t ghcr.io/${{ github.repository_owner }}/chur-webhook:${{ github.ref_name }} \
            -t ghcr.io/${{ github.repository_owner }}/chur-webhook:latest \
            -f Dockerfile.webhook .
          docker buildx build --push --platform linux/amd64,linux/arm64 \
            -t ghcr.io/${{ github.repository_owner }}/chur-init:${{ github.ref_name }} \
            -t ghcr.io/${{ github.repository_owner }}/chur-init:latest \
            -f Dockerfile.init .
          docker buildx build --push --platform linux/amd64,linux/arm64 \
            -t ghcr.io/${{ github.repository_owner }}/chur-keeper:${{ github.ref_name }} \
            -t ghcr.io/${{ github.repository_owner }}/chur-keeper:latest \
            -f Dockerfile.keeper .

      - name: Upload SBOMs
        uses: actions/upload-artifact@v7
        with:
          name: sboms
          path: sbom-*.json
          retention-days: 90

      - name: Update Chart.yaml version
        run: |
          VER="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${VER}/" charts/chur/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VER}\"/" charts/chur/Chart.yaml

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            {
              echo "CHANGELOG<<EOF"
              git log --no-merges --format="* %s" "$PREV_TAG..HEAD"
              echo "EOF"
            } >> $GITHUB_ENV
          fi

      - name: Publish Helm chart
        uses: helm/chart-releaser-action@v1
        with:
          charts_dir: charts
          pages_branch: helm-charts
          mark_as_latest: false
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_RELEASE_NAME_TEMPLATE: "v{{ .Version }}"

      - name: Update release body
        if: env.CHANGELOG != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --notes "$CHANGELOG"
