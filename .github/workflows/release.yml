name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build and push webhook
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.webhook
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chur-webhook:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/chur-webhook:latest

      - name: Build and push init
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.init
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chur-init:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/chur-init:latest

      - name: Build and push keeper
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.keeper
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chur-keeper:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/chur-keeper:latest

      - name: Update Chart.yaml version
        run: |
          VER="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${VER}/" charts/chur/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VER}\"/" charts/chur/Chart.yaml

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            {
              echo "CHANGELOG<<EOF"
              git log --no-merges --format="* %s" "$PREV_TAG..HEAD"
              echo "EOF"
            } >> $GITHUB_ENV
          fi

      - name: Publish Helm chart
        uses: helm/chart-releaser-action@v1
        with:
          charts_dir: charts
          pages_branch: helm-charts
          mark_as_latest: false
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_RELEASE_NAME_TEMPLATE: "v{{ .Version }}"
          CR_RELEASE_DESCRIPTION: ${{ env.CHANGELOG }}
