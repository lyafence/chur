version: 2
project_name: chur

before:
  hooks:
    - go mod tidy

builds:
  - id: webhook
    binary: chur-webhook
    main: ./cmd/webhook
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

  - id: init
    binary: chur-init
    main: ./cmd/init
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    files:
      - LICENSE
      - README.md

dockers_v2:
  - id: webhook
    dockerfile: Dockerfile.webhook
    images:
      - ghcr.io/lyafence/chur-webhook
    tags:
      - "v{{ .Version }}"
      - latest
    platforms:
      - linux/amd64

  - id: init
    dockerfile: Dockerfile.init
    images:
      - ghcr.io/lyafence/chur-init
    tags:
      - "v{{ .Version }}"
      - latest
    platforms:
      - linux/amd64

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
