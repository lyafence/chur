<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">

<style>
  .markdown-body .highlight {
    overflow: hidden;
    border-radius: 6px;
  }
  .markdown-body .highlight pre {
    margin: 0;
    border: none;
    border-radius: 0;
  }
  .markdown-body pre {
    position: relative;
    overflow: hidden;
    border-radius: 6px;
  }
  .markdown-body pre code {
    display: block;
    padding-right: 4.5rem;
  }

  .copy-btn {
    position: absolute;
    top: 50%;
    right: 0.75rem;
    transform: translateY(-50%);
    padding: 0.3rem 0.7rem;
    font-size: 0.75rem;
    line-height: 1.25;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    background-color: #f6f8fa;
    color: #24292f;
    cursor: pointer;
    opacity: 0;
    z-index: 20;
    transition: opacity 0.15s ease, background-color 0.15s ease;
  }
  .markdown-body pre:hover .copy-btn,
  .copy-btn:focus {
    opacity: 1;
  }

  @media (prefers-color-scheme: dark) {
    body { background-color: #0d1117; }
    .markdown-body { color: #e6edf3; }
    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      color: #f0f6fc;
      border-bottom-color: #21262d;
    }
    .markdown-body a { color: #58a6ff; }
    .markdown-body a:hover { color: #79c0ff; }
    .markdown-body code { background-color: rgba(110, 118, 129, 0.4); color: #e6edf3; }
    .markdown-body pre,
    .markdown-body .highlight { background-color: #161b22; border: 1px solid #30363d; }
    .markdown-body .highlight pre { background-color: transparent; border: none; }
    .markdown-body .highlight code { color: #e6edf3; }
    .markdown-body blockquote { color: #848d97; border-left-color: #30363d; }
    .markdown-body hr { background-color: #30363d; }
    .markdown-body table th,
    .markdown-body table td { border-color: #30363d; }
    .markdown-body table tr { background-color: #0d1117; border-top-color: #30363d; }
    .markdown-body table tr:nth-child(2n) { background-color: #161b22; }

    .highlight .c  { color: #8b949e; }
    .highlight .cm { color: #8b949e; }
    .highlight .cp { color: #8b949e; }
    .highlight .c1 { color: #8b949e; }
    .highlight .cs { color: #8b949e; }
    .highlight .k  { color: #ff7b72; }
    .highlight .kc { color: #ff7b72; }
    .highlight .kd { color: #ff7b72; }
    .highlight .kn { color: #ff7b72; }
    .highlight .kp { color: #ff7b72; }
    .highlight .kr { color: #ff7b72; }
    .highlight .kt { color: #ff7b72; }
    .highlight .nb { color: #ffa657; }
    .highlight .nt { color: #ff7b72; }
    .highlight .s  { color: #a5d6ff; }
    .highlight .sa { color: #a5d6ff; }
    .highlight .sb { color: #a5d6ff; }
    .highlight .sc { color: #a5d6ff; }
    .highlight .dl { color: #a5d6ff; }
    .highlight .s2 { color: #a5d6ff; }
    .highlight .sh { color: #a5d6ff; }
    .highlight .s1 { color: #a5d6ff; }
    .highlight .sx { color: #a5d6ff; }
    .highlight .o  { color: #ff7b72; }
    .highlight .ow { color: #ff7b72; }
    .highlight .p  { color: #e6edf3; }
    .highlight .m  { color: #79c0ff; }
    .highlight .mf { color: #79c0ff; }
    .highlight .mh { color: #79c0ff; }
    .highlight .mi { color: #79c0ff; }
    .highlight .mo { color: #79c0ff; }
    .highlight .mb { color: #79c0ff; }
    .highlight .mx { color: #79c0ff; }
    .highlight .nf { color: #d2a8ff; }
    .highlight .nc { color: #ffa657; }
    .highlight .nv { color: #ffa657; }
    .highlight .vc { color: #ffa657; }
    .highlight .vg { color: #ffa657; }
    .highlight .vi { color: #ffa657; }
    .highlight .vm { color: #ffa657; }
    .highlight .nd { color: #d2a8ff; }
    .highlight .no { color: #79c0ff; }
    .highlight .na { color: #ffa657; }
    .highlight .ne { color: #ffa657; }
    .highlight .nn { color: #ffa657; }
    .highlight .nl { color: #ffa657; }
    .highlight .py { color: #ffa657; }
    .highlight .nx { color: #e6edf3; }
    .highlight .err { color: #f85149; }
    .highlight .gd { color: #ffdcd7; }
    .highlight .gi { color: #acf2bd; }
    .highlight .ge { font-style: italic; }
    .highlight .gs { font-weight: bold; }
    .highlight .gh { color: #79c0ff; }
    .highlight .gu { color: #79c0ff; }
    .highlight .go { color: #8b949e; }
    .highlight .gp { color: #8b949e; }
    .highlight .gr { color: #ffa198; }
    .highlight .gt { color: #ff7b72; }
    .highlight .w  { color: #6e7681; }

    .copy-btn {
      border-color: #30363d;
      background-color: #21262d;
      color: #c9d1d9;
    }
    .copy-btn:hover {
      background-color: #30363d;
      color: #f0f6fc;
    }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.markdown-body pre').forEach(function (pre) {
      var code = pre.querySelector('code');
      if (!code) return;
      if (pre.querySelector('.copy-btn')) return;

      var button = document.createElement('button');
      button.className = 'copy-btn';
      button.type = 'button';
      button.setAttribute('aria-label', 'Copy code to clipboard');
      button.textContent = 'Copy';

      button.addEventListener('click', function () {
        var text = code.textContent || '';
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            button.textContent = 'Copied!';
            setTimeout(function () { button.textContent = 'Copy'; }, 1500);
          }).catch(function () { fallbackCopy(text); });
        } else { fallbackCopy(text); }
      });

      function fallbackCopy(text) {
        var textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          button.textContent = 'Copied!';
          setTimeout(function () { button.textContent = 'Copy'; }, 1500);
        } catch (err) {
          button.textContent = 'Failed';
          setTimeout(function () { button.textContent = 'Copy'; }, 1500);
        }
        document.body.removeChild(textarea);
      }

      pre.appendChild(button);
    });
  });
</script>
